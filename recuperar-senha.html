<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Recupere acesso à sua conta em Robério Diógenes." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Recuperar Senha | Robério Diógenes</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/variables.css" />
  
  <style>
    /* ── Layout ──────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--fonte-ui);
      background: var(--fundo);
      color: var(--texto);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Ornamento de fundo */
    body::before {
      content: '❧';
      font-family: var(--fonte-titulo);
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28rem;
      line-height: 1;
      color: var(--ornamento-cor);
      opacity: 0.07;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      animation: flutuar 8s ease-in-out infinite;
    }

    @keyframes flutuar {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -52%) scale(1.02); }
    }

    /* ── Card ────────────────────────────────────────────────── */
    .auth-card {
      position: relative;
      z-index: 1;
      background: var(--fundo-card);
      border: 1px solid var(--borda-media);
      border-radius: var(--raio-xl);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--sombra-lg), var(--sombra-dourada);
    }

    .auth-voltar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--texto-3);
      text-decoration: none;
      font-family: var(--fonte-display);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color var(--trans);
      margin-bottom: 2rem;
    }

    .auth-voltar:hover {
      color: var(--ouro);
    }

    /* ── Cabeçalho ───────────────────────────────────────────── */
    .auth-logo {
      font-family: var(--fonte-titulo);
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--ouro);
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .auth-logo em {
      font-style: italic;
    }

    .auth-subtitulo {
      font-family: var(--fonte-display);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--texto-3);
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-descricao {
      font-size: 0.9rem;
      color: var(--texto-2);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* ── Formulário ──────────────────────────────────────────── */
    .auth-grupo {
      margin-bottom: 1.25rem;
    }

    .auth-label {
      display: block;
      font-size: 0.82rem;
      font-family: var(--fonte-display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--texto-2);
      margin-bottom: 0.5rem;
    }

    .auth-input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: var(--fundo-2);
      border: 1px solid var(--borda-media);
      border-radius: var(--raio);
      color: var(--texto);
      font-family: var(--fonte-ui);
      font-size: 0.95rem;
      transition: border-color var(--trans), box-shadow var(--trans);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--ouro);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.15);
    }

    .auth-input::placeholder {
      color: var(--texto-3);
    }

    /* ── Botões ──────────────────────────────────────────────── */
    .btn-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: var(--raio);
      cursor: pointer;
      font-family: var(--fonte-display);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all var(--trans);
    }

    .btn-primario-auth {
      background: linear-gradient(135deg, var(--ouro), var(--ouro-escuro));
      color: var(--texto-inv);
    }

    .btn-primario-auth:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: var(--sombra-dourada);
    }

    .btn-primario-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Mensagem de erro/alerta ─────────────────────────────── */
    .auth-alerta {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: var(--raio);
      margin-bottom: 1rem;
      font-size: 0.88rem;
      border-left: 3px solid;
    }

    .auth-alerta.erro {
      background: rgba(139,58,42,0.12);
      border-color: var(--ferrugem);
      color: var(--ferrugem);
    }

    .auth-alerta.sucesso {
      background: rgba(74,124,74,0.12);
      border-color: #4a7c4a;
      color: #4a7c4a;
    }

    .auth-alerta.info {
      background: rgba(184,134,11,0.12);
      border-color: var(--ouro);
      color: var(--ouro);
    }

    .auth-alerta.visivel {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Rodapé do card ──────────────────────────────────────── */
    .auth-rodape {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--texto-3);
    }

    .auth-rodape a {
      color: var(--ouro);
      text-decoration: none;
    }

    .auth-rodape a:hover {
      text-decoration: underline;
    }

    /* ── Responsividade ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }

      .auth-logo {
        font-size: 1.5rem;
      }
    }

    /* ── Toast Notifications ─────────────────────────────────── */
    .toast-wrap {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      pointer-events: none;
    }

    .toast {
      background: var(--fundo-card);
      border: 1px solid var(--borda-media);
      border-radius: var(--raio-lg);
      padding: 0.85rem 1.5rem;
      font-family: var(--fonte-ui);
      font-size: 0.9rem;
      color: var(--texto);
      box-shadow: var(--sombra-lg);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: toastIn 0.35s ease forwards;
      white-space: nowrap;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas-particulas" aria-hidden="true"></canvas>

  <div class="auth-card" role="main">
    <a href="index.html" class="auth-voltar" aria-label="Voltar à página inicial">
      <i class="fa fa-arrow-left" aria-hidden="true"></i> Voltar
    </a>

    <h1 class="auth-logo">Robério <em>Diógenes</em></h1>
    <p class="auth-subtitulo">Recuperar Senha</p>

    <!-- Alerta (erros / sucesso / info) -->
    <div class="auth-alerta" id="authAlerta" role="alert" aria-live="polite"></div>

    <!-- Descrição -->
    <p class="auth-descricao">
      Informe o e-mail associado à sua conta. Enviaremos um link para redefinir sua senha.
    </p>

    <!-- Formulário de recuperação -->
    <form id="formRecuperar" novalidate>
      <div class="auth-grupo">
        <label class="auth-label" for="recEmail">E-mail</label>
        <input
          class="auth-input"
          type="email"
          id="recEmail"
          name="email"
          placeholder="seu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <button type="submit" class="btn-auth btn-primario-auth" id="btnRecuperar">
        <i class="fa fa-paper-plane" aria-hidden="true"></i> Enviar Link de Reset
      </button>
    </form>

    <!-- Debug box (só visível no XAMPP, em ambiente local) -->
    <div id="debugBox" hidden style="margin-top:1rem;padding:0.75rem;background:rgba(184,134,11,0.08);border:1px dashed var(--ouro);border-radius:8px;font-size:0.8rem;color:var(--texto-3);">
      <strong style="color:var(--ouro);display:block;margin-bottom:0.3rem;">🛠 Modo local — link de redefinição:</strong>
      <a id="debugLink" href="#" target="_blank" style="color:var(--ouro);word-break:break-all;">Clique aqui para redefinir a senha</a>
      <p style="margin-top:0.4rem;font-size:0.75rem;">Em produção, este link é enviado por e-mail.</p>
    </div>

    <!-- Rodapé -->
    <p class="auth-rodape">
      Já tem acesso? <a href="login.html">Volte ao login</a>
    </p>
  </div>

  <!-- Toast Container -->
  <div class="toast-wrap" id="toastWrap"></div>

  <script src="js/global.js"></script>
  <script src="js/api-client.js"></script>
  <script>
    (function () {
      'use strict';

      // ── Helpers de UI ────────────────────────────────────────
      function mostrarAlerta(msg, tipo = 'erro') {
        const el = document.getElementById('authAlerta');
        el.textContent = msg;
        el.className = 'auth-alerta ' + tipo + ' visivel';
      }

      function ocultarAlerta() {
        const el = document.getElementById('authAlerta');
        el.className = 'auth-alerta';
      }

      function mostrarToast(msg, tipo = 'info') {
        const wrap = document.getElementById('toastWrap');
        const toast = document.createElement('div');
        toast.className = 'toast';
        
        let icone = '✓';
        if (tipo === 'erro') icone = '✕';
        else if (tipo === 'sucesso') icone = '✓';
        
        toast.innerHTML = `<span>${icone}</span> <span>${msg}</span>`;
        wrap.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = 'toastOut 0.35s ease forwards';
          setTimeout(() => toast.remove(), 350);
        }, 5000);
      }

      // ── Recuperar Senha ──────────────────────────────────────
      document.getElementById('formRecuperar').addEventListener('submit', async function (e) {
        e.preventDefault();
        ocultarAlerta();

        const email = document.getElementById('recEmail').value.trim();
        const btn = document.getElementById('btnRecuperar');

        if (!email) {
          mostrarAlerta('Informe seu e-mail.', 'erro');
          return;
        }

        // Validação básica de e-mail
        if (!email.includes('@')) {
          mostrarAlerta('E-mail inválido.', 'erro');
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Enviando…';

        // Chamada à API
        const r = await API.Auth.recuperar(email);
        
        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-paper-plane"></i> Enviar Link de Reset';

        if (r.ok) {
          mostrarAlerta(
            'Se este e-mail estiver cadastrado, o link de redefinição foi gerado.',
            'sucesso'
          );

          // Limpar formulário
          document.getElementById('recEmail').value = '';

          // Em ambiente local, exibir link direto para testes
          if (r._debug_link) {
            const debugDiv = document.getElementById('debugBox');
            const debugLink = document.getElementById('debugLink');
            if (debugDiv && debugLink) {
              debugLink.href = r._debug_link;
              debugDiv.hidden = false;
            } else {
              // Fallback: mostrar no alerta
              const el = document.getElementById('authAlerta');
              if (el) {
                el.innerHTML += `<div style="margin-top:0.75rem;padding:0.75rem;background:rgba(184,134,11,0.1);border:1px dashed var(--ouro);border-radius:6px;font-size:0.82rem;">
                  🛠 <strong>Link local (só aparece no XAMPP):</strong><br>
                  <a href="${r._debug_link}" style="color:var(--ouro);word-break:break-all;">${r._debug_link}</a>
                </div>`;
              }
            }
          } else {
            // Em produção, redirecionar para login
            setTimeout(() => { window.location.href = 'login.html'; }, 3000);
          }
        } else {
          mostrarAlerta(
            r.erro || 'Erro ao enviar link. Tente novamente mais tarde.',
            'erro'
          );
          mostrarToast('Erro ao enviar link', 'erro');
        }
      });

      // ── Verificar se já está logado ──────────────────────────
      API.Auth.sessao().then(r => {
        if (r.ok && r.logado) window.location.href = 'leitor/index.html';
      });
    })();
  </script>
</body>
</html>
