<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Pagamento Aprovado | Robério Diógenes</title>
  <link rel="icon" type="image/png" href="../img/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../css/variables.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--fonte-ui); background: var(--fundo); color: var(--texto);
      min-height: 100svh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: var(--fundo-card); border: 1px solid var(--borda);
      border-radius: var(--raio-xl); padding: 3rem 2.5rem;
      max-width: 480px; width: 100%; text-align: center;
      box-shadow: var(--sombra-md);
    }
    .icone {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(46,125,50,0.12); border: 2px solid #2E7D32;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.75rem; font-size: 1.8rem; color: #2E7D32;
    }
    .icone.aguardando { background: rgba(184,134,11,0.12); border-color: var(--ouro); color: var(--ouro); }
    h1 {
      font-family: var(--fonte-titulo); font-size: 1.8rem;
      font-weight: 400; margin-bottom: 0.75rem;
    }
    p { font-size: 0.95rem; color: var(--texto-2); line-height: 1.7; margin-bottom: 0.5rem; }
    .btns { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
    .btn {
      padding: 0.75rem 1.5rem; border-radius: var(--raio-lg);
      font-family: var(--fonte-display); font-size: 0.72rem;
      letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .btn-primario { background: var(--ouro); color: #1A0F00; border: none; }
    .btn-primario:hover { opacity: 0.85; }
    .btn-sec { background: none; border: 1px solid var(--borda-media); color: var(--texto-3); }
    .btn-sec:hover { border-color: var(--ouro); color: var(--ouro); }
    .status-badge {
      display: inline-block; margin: 1rem 0;
      font-family: var(--fonte-display); font-size: 0.68rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      background: rgba(46,125,50,0.1); color: #2E7D32;
      border: 1px solid rgba(46,125,50,0.3);
      border-radius: 20px; padding: 0.3rem 0.9rem;
    }
    .spinner { animation: girar 1s linear infinite; color: var(--ouro); margin: 1rem 0; }
    @keyframes girar { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="card-conteudo">
  <!-- Preenchido pelo JS conforme o status -->
  <i class="fa fa-circle-notch fa-2x spinner" aria-hidden="true"></i>
  <p>Verificando seu pagamento…</p>
</div>

<script>
(async function () {
  'use strict';

  const params = new URLSearchParams(window.location.search);
  const ref    = params.get('ref') || '';
  const card   = document.getElementById('card-conteudo');

  // Aguarda 2s para o webhook ser processado, depois verifica o status
  await new Promise(r => setTimeout(r, 2000));

  let status = 'aprovada', tipo = 'compra', item = '';

  if (ref) {
    try {
      const r = await fetch(`../backend/pagamento.php?acao=status&ref=${encodeURIComponent(ref)}`, {
        credentials: 'same-origin'
      });
      const d = await r.json();
      if (d.ok) { status = d.status; tipo = d.tipo; item = d.item; }
    } catch (e) {}
  }

  /* ── Renderiza conforme status ── */
  if (status === 'aprovada') {
    const destino = tipo === 'assinatura'
      ? '../leitor/index.html'
      : `../leitor/livro.html?livro=${item}`;

    card.innerHTML = `
      <div class="icone"><i class="fa fa-check" aria-hidden="true"></i></div>
      <h1>Pagamento aprovado!</h1>
      <span class="status-badge"><i class="fa fa-check" aria-hidden="true"></i> Aprovado</span>
      <p>${tipo === 'assinatura'
        ? 'Sua assinatura está ativa. Acesse a biblioteca e comece a ler agora.'
        : 'Seu livro está disponível no leitor. Boa leitura!'
      }</p>
      <div class="btns">
        <a href="${destino}" class="btn btn-primario">
          <i class="fa fa-book-open" aria-hidden="true"></i>
          ${tipo === 'assinatura' ? 'Ir para a biblioteca' : 'Ler agora'}
        </a>
        <a href="../livros.html" class="btn btn-sec">Ver mais livros</a>
      </div>`;

    // Redireciona automaticamente em 5s
    let cont = 5;
    const intervalo = setInterval(() => {
      cont--;
      const p = card.querySelector('p');
      if (p) p.textContent = (tipo === 'assinatura'
        ? 'Sua assinatura está ativa. Redirecionando em '
        : 'Seu livro está disponível. Redirecionando em ') + cont + 's…';
      if (cont <= 0) { clearInterval(intervalo); window.location.href = destino; }
    }, 1000);

  } else if (status === 'pendente') {
    card.innerHTML = `
      <div class="icone aguardando"><i class="fa fa-clock" aria-hidden="true"></i></div>
      <h1>Pagamento em análise</h1>
      <span class="status-badge" style="background:rgba(184,134,11,0.1);color:var(--ouro);border-color:rgba(184,134,11,0.3)">
        <i class="fa fa-clock" aria-hidden="true"></i> Aguardando
      </span>
      <p>Seu pagamento está sendo processado. Assim que confirmado, seu acesso será liberado automaticamente.</p>
      <p style="font-size:0.82rem;margin-top:0.5rem">Você receberá uma notificação por e-mail.</p>
      <div class="btns">
        <a href="../leitor/index.html" class="btn btn-primario">Área do leitor</a>
        <a href="../livros.html" class="btn btn-sec">Biblioteca</a>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="icone" style="background:rgba(192,57,43,0.1);border-color:#c0392b;color:#c0392b">
        <i class="fa fa-xmark" aria-hidden="true"></i>
      </div>
      <h1>Pagamento não aprovado</h1>
      <p>Houve um problema com seu pagamento. Nenhum valor foi cobrado.</p>
      <p style="font-size:0.82rem;margin-top:0.5rem">Verifique os dados do cartão e tente novamente.</p>
      <div class="btns">
        <a href="assinatura.html" class="btn btn-primario">Tentar novamente</a>
        <a href="../livros.html" class="btn btn-sec">Voltar à biblioteca</a>
      </div>`;
  }
})();
</script>
</body>
</html>
