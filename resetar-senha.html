<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Redefina sua senha em Robério Diógenes." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Redefinir Senha | Robério Diógenes</title>
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/variables.css" />

  <style>
    /* ── Layout & Reset ──────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--fonte-ui);
      background: var(--fundo);
      color: var(--texto);
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Ornamento de fundo */
    body::before {
      content: '❧';
      font-family: var(--fonte-titulo);
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28rem;
      line-height: 1;
      color: var(--ornamento-cor);
      opacity: 0.07;
      pointer-events: none;
      user-select: none;
      z-index: 0;
      animation: flutuar 8s ease-in-out infinite;
    }

    @keyframes flutuar {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -52%) scale(1.02); }
    }

    /* ── Card Principal ──────────────────────────────────────── */
    .auth-card {
      position: relative;
      z-index: 1;
      background: var(--fundo-card);
      border: 1px solid var(--borda-media);
      border-radius: var(--raio-xl);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--sombra-lg), var(--sombra-dourada);
    }

    .auth-voltar {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      color: var(--texto-3);
      text-decoration: none;
      font-family: var(--fonte-display);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color var(--trans);
      margin-bottom: 2rem;
    }

    .auth-voltar:hover {
      color: var(--ouro);
    }

    /* ── Cabeçalho ───────────────────────────────────────────── */
    .auth-logo {
      font-family: var(--fonte-titulo);
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--ouro);
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .auth-logo em {
      font-style: italic;
    }

    .auth-subtitulo {
      font-family: var(--fonte-display);
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--texto-3);
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-descricao {
      font-size: 0.9rem;
      color: var(--texto-2);
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    /* ── Formulário ──────────────────────────────────────────── */
    .auth-grupo {
      margin-bottom: 1.5rem;
    }

    .auth-label {
      display: block;
      font-size: 0.82rem;
      font-family: var(--fonte-display);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--texto-2);
      margin-bottom: 0.5rem;
    }

    .auth-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--fundo-2);
      border: 1px solid var(--borda-media);
      border-radius: var(--raio);
      color: var(--texto);
      font-family: var(--fonte-ui);
      font-size: 0.95rem;
      transition: border-color var(--trans), box-shadow var(--trans);
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--ouro);
      box-shadow: 0 0 0 3px rgba(184,134,11,0.15);
    }

    .auth-input::placeholder {
      color: var(--texto-3);
    }

    /* Força da senha visual */
    .forca-barra {
      height: 4px;
      border-radius: 2px;
      margin-top: 0.5rem;
      background: var(--borda);
      overflow: hidden;
      display: none;
    }

    .forca-barra-inner {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }

    .forca-texto {
      font-size: 0.75rem;
      color: var(--texto-3);
      margin-top: 0.25rem;
      display: none;
    }

    /* Toggle Senha */
    .senha-wrap {
      position: relative;
    }

    .senha-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--texto-3);
      font-size: 0.9rem;
      padding: 0.25rem;
      transition: color var(--trans);
    }

    .senha-toggle:hover {
      color: var(--ouro);
    }

    /* ── Botões ──────────────────────────────────────────────── */
    .btn-auth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: var(--raio);
      cursor: pointer;
      font-family: var(--fonte-display);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all var(--trans);
    }

    .btn-primario-auth {
      background: linear-gradient(135deg, var(--ouro), var(--ouro-escuro));
      color: var(--texto-inv);
    }

    .btn-primario-auth:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: var(--sombra-dourada);
    }

    .btn-primario-auth:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Alertas ─────────────────────────────────────────────── */
    .auth-alerta {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: var(--raio);
      margin-bottom: 1rem;
      font-size: 0.88rem;
      border-left: 3px solid;
      animation: slideDown 0.3s ease;
    }

    .auth-alerta.erro {
      background: rgba(139,58,42,0.12);
      border-color: var(--ferrugem);
      color: var(--ferrugem);
    }

    .auth-alerta.sucesso {
      background: rgba(74,124,74,0.12);
      border-color: #4a7c4a;
      color: #4a7c4a;
    }

    .auth-alerta.info {
      background: rgba(184,134,11,0.12);
      border-color: var(--ouro);
      color: var(--ouro);
    }

    .auth-alerta.visivel {
      display: block;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Rodapé ──────────────────────────────────────────────── */
    .auth-rodape {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.88rem;
      color: var(--texto-3);
    }

    .auth-rodape a {
      color: var(--ouro);
      text-decoration: none;
    }

    .auth-rodape a:hover {
      text-decoration: underline;
    }

    /* ── Responsividade ──────────────────────────────────────── */
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem;
      }

      .auth-logo {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas-particulas" aria-hidden="true"></canvas>

  <div class="auth-card" role="main">
    <a href="login.html" class="auth-voltar" aria-label="Voltar ao login">
      <i class="fa fa-arrow-left" aria-hidden="true"></i> Voltar
    </a>

    <h1 class="auth-logo">Robério <em>Diógenes</em></h1>
    <p class="auth-subtitulo">Redefinir Senha</p>

    <!-- Alerta -->
    <div class="auth-alerta" id="authAlerta" role="alert" aria-live="polite"></div>

    <!-- Descrição -->
    <p class="auth-descricao">
      Você recebeu um link de recuperação. Crie uma nova senha abaixo.
    </p>

    <!-- Formulário de Reset -->
    <form id="formResetar" novalidate>
      <!-- Campo Token (hidden) -->
      <input type="hidden" id="resetToken" name="token" />

      <!-- Nova Senha -->
      <div class="auth-grupo">
        <label class="auth-label" for="novaSenha">Nova Senha</label>
        <div class="senha-wrap">
          <input
            class="auth-input"
            type="password"
            id="novaSenha"
            name="senha"
            placeholder="••••••••"
            required
            minlength="8"
            style="padding-right: 2.5rem;"
          />
          <button type="button" class="senha-toggle" aria-label="Mostrar senha" onclick="alternarSenha('novaSenha', this)">
            <i class="fa fa-eye" aria-hidden="true"></i>
          </button>
        </div>
        <div class="forca-barra">
          <div class="forca-barra-inner" id="forcaInner"></div>
        </div>
        <div class="forca-texto" id="forcaTexto"></div>
      </div>

      <!-- Confirmar Senha -->
      <div class="auth-grupo">
        <label class="auth-label" for="confirmarSenha">Confirmar Senha</label>
        <div class="senha-wrap">
          <input
            class="auth-input"
            type="password"
            id="confirmarSenha"
            name="confirmar_senha"
            placeholder="••••••••"
            required
            minlength="8"
            style="padding-right: 2.5rem;"
          />
          <button type="button" class="senha-toggle" aria-label="Mostrar senha" onclick="alternarSenha('confirmarSenha', this)">
            <i class="fa fa-eye" aria-hidden="true"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-auth btn-primario-auth" id="btnResetar">
        <i class="fa fa-lock" aria-hidden="true"></i> Redefinir Senha
      </button>
    </form>

    <!-- Rodapé -->
    <p class="auth-rodape">
      Lembrou a senha? <a href="login.html">Volte ao login</a>
    </p>
  </div>

  <script src="js/global.js"></script>
  <script src="js/api-client.js"></script>
  <script>
    (function () {
      'use strict';

      // ── Extrair token da URL ─────────────────────────────────
      function obterTokenDaURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('token');
      }

      // ── Helpers de UI ────────────────────────────────────────
      function mostrarAlerta(msg, tipo = 'erro') {
        const el = document.getElementById('authAlerta');
        el.textContent = msg;
        el.className = 'auth-alerta ' + tipo + ' visivel';
      }

      function ocultarAlerta() {
        const el = document.getElementById('authAlerta');
        el.className = 'auth-alerta';
      }

      // ── Validação de Força de Senha ──────────────────────────
      document.getElementById('novaSenha').addEventListener('input', function () {
        const senha = this.value;
        const forcaBarra = document.getElementById('forcaInner');
        const forcaTexto = document.getElementById('forcaTexto');

        let forca = 0;
        let texto = '';

        if (senha.length >= 8) forca += 25;
        if (/[a-z]/.test(senha)) forca += 25;
        if (/[A-Z]/.test(senha)) forca += 25;
        if (/[0-9]/.test(senha)) forca += 25;

        if (forca === 0) {
          texto = '';
          forcaBarra.parentElement.style.display = 'none';
          forcaTexto.style.display = 'none';
        } else {
          forcaBarra.parentElement.style.display = 'block';
          forcaTexto.style.display = 'block';
          forcaBarra.style.width = forca + '%';

          if (forca < 50) {
            texto = 'Fraca';
            forcaBarra.style.backgroundColor = '#c0392b';
          } else if (forca < 75) {
            texto = 'Média';
            forcaBarra.style.backgroundColor = '#D4A843';
          } else {
            texto = 'Forte';
            forcaBarra.style.backgroundColor = '#4a7c4a';
          }

          forcaTexto.textContent = 'Força: ' + texto;
        }
      });

      // ── Redefinir Senha ──────────────────────────────────────
      document.getElementById('formResetar').addEventListener('submit', async function (e) {
        e.preventDefault();
        ocultarAlerta();

        const token = document.getElementById('resetToken').value;
        const novaSenha = document.getElementById('novaSenha').value;
        const confirmarSenha = document.getElementById('confirmarSenha').value;
        const btn = document.getElementById('btnResetar');

        // Validações
        if (!token) {
          mostrarAlerta('Token inválido ou expirado. Solicite um novo link.', 'erro');
          return;
        }

        if (!novaSenha || novaSenha.length < 8) {
          mostrarAlerta('A senha deve ter pelo menos 8 caracteres.', 'erro');
          return;
        }

        if (novaSenha !== confirmarSenha) {
          mostrarAlerta('As senhas não conferem.', 'erro');
          return;
        }

        if (!/[a-z]/.test(novaSenha) || !/[0-9]/.test(novaSenha)) {
          mostrarAlerta('A senha deve conter letras e números.', 'erro');
          return;
        }

        btn.disabled = true;
        btn.innerHTML = '<i class="fa fa-circle-notch fa-spin"></i> Redefinindo…';

        // Chamada à API (será implementada em backend/auth/resetar-senha.php)
        const r = await API.Auth.resetarSenha(token, novaSenha);

        btn.disabled = false;
        btn.innerHTML = '<i class="fa fa-lock"></i> Redefinir Senha';

        if (r.ok) {
          mostrarAlerta('Senha redefinida com sucesso! Redirecionando...', 'sucesso');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          mostrarAlerta(r.erro || 'Erro ao redefinir senha. Tente novamente.', 'erro');
        }
      });

      // ── Verificar Token na URL ───────────────────────────────
      const token = obterTokenDaURL();
      if (!token) {
        mostrarAlerta('Nenhum token fornecido. Solicite um novo link de recuperação.', 'info');
        document.getElementById('resetToken').value = '';
      } else {
        document.getElementById('resetToken').value = token;
      }

      // ── Verificar se já está logado ──────────────────────────
      if (typeof API !== 'undefined' && API.Auth && API.Auth.sessao) {
        API.Auth.sessao().then(r => {
          if (r.ok && r.logado) window.location.href = 'leitor/index.html';
        });
      }
    })();

    // ── Toggle Senha ──────────────────────────────────────────
    function alternarSenha(id, btn) {
      const input = document.getElementById(id);
      const icone = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icone.className = 'fa fa-eye-slash';
        btn.setAttribute('aria-label', 'Ocultar senha');
      } else {
        input.type = 'password';
        icone.className = 'fa fa-eye';
        btn.setAttribute('aria-label', 'Mostrar senha');
      }
    }
  </script>
</body>
</html>
