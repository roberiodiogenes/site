<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada | Robério Diógenes</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="img/favicon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/variables.css" />
  <style>

    /* ── RESET COMPLETO DA PÁGINA ────────────────────────────── */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;           /* sem scroll — é full-screen */
      background: #0D0A07;        /* fallback escuro enquanto carrega */
    }

    /* ── IMAGEM DE FUNDO ─────────────────────────────────────── */
    .pg404-fundo {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .pg404-fundo picture,
    .pg404-fundo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    /* ── NAV — forçado escuro para funcionar sobre a imagem ───── */
    #nav {
      background: rgba(10, 8, 5, 0.75) !important;
      border-bottom-color: rgba(200, 148, 12, 0.20) !important;
      backdrop-filter: blur(14px) !important;
      -webkit-backdrop-filter: blur(14px) !important;
      z-index: 100;
    }

    .nav-logo,
    .nav-logo span,
    .nav-links a,
    .tema-btn,
    .fonte-btn {
      color: #D8CCBA !important;
    }

    .nav-links a:hover,
    .nav-links a.ativa,
    .nav-logo:hover {
      color: #C8940C !important;
      background: rgba(200, 148, 12, 0.10) !important;
    }

    .tema-btn:hover,
    .tema-btn.ativo {
      background: rgba(200, 148, 12, 0.15) !important;
      color: #C8940C !important;
      border-color: rgba(200, 148, 12, 0.50) !important;
    }

    .nav-toggle span {
      background: #D8CCBA !important;
    }

    /* ── HEADING OCULTO — acessibilidade / SEO ───────────────── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ═══════════════════════════════════════════════════════════
       DESKTOP — botões na área escura inferior-esquerda
       A imagem já traz: 404, título, ornamento e frase.
       O HTML fica apenas com a navegação interativa.
       ═══════════════════════════════════════════════════════════ */
    .pg404-painel {
      position: fixed;
      z-index: 10;

      /* desktop: canto inferior esquerdo — área escura livre */
      bottom: 8%;
      left: 4%;
    }

    /* scrim mínimo atrás dos botões (segurança de leitura) */
    .pg404-painel::before {
      content: '';
      position: absolute;
      inset: -1.5rem -1.75rem;
      background: radial-gradient(
        ellipse at 30% 60%,
        rgba(0,0,0,0.45) 0%,
        transparent 80%
      );
      border-radius: 12px;
      pointer-events: none;
      z-index: 0;
    }

    .pg404-acoes {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      align-items: center;
      position: relative;
      z-index: 1;
      margin-bottom: 1rem;
    }

    /* botão Voltar estilo fantasma escuro */
    .pg404-voltar {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--fonte-ui);
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: rgba(216, 204, 186, 0.85);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(216, 204, 186, 0.25);
      border-radius: 20px;
      padding: 0.5rem 1.1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
    }

    .pg404-voltar:hover {
      background: rgba(200, 148, 12, 0.15);
      border-color: rgba(200, 148, 12, 0.55);
      color: #E8B030;
    }

    /* botão Início */
    .pg404-inicio {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--fonte-ui);
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #0D0A07;
      background: #C8940C;
      border: 1px solid #C8940C;
      border-radius: 6px;
      padding: 0.55rem 1.35rem;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .pg404-inicio:hover {
      background: #E8B030;
      border-color: #E8B030;
      color: #0D0A07;
      transform: translateY(-2px);
    }

    /* botão Biblioteca */
    .pg404-biblioteca {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--fonte-ui);
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(216, 204, 186, 0.90);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(200, 148, 12, 0.45);
      border-radius: 6px;
      padding: 0.55rem 1.35rem;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .pg404-biblioteca:hover {
      background: rgba(200, 148, 12, 0.15);
      border-color: rgba(200, 148, 12, 0.70);
      color: #E8B030;
      transform: translateY(-2px);
    }

    /* links explorar */
    .pg404-explorar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .pg404-explorar-label {
      font-family: var(--fonte-display);
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(200, 148, 12, 0.70);
      margin-right: 0.15rem;
    }

    .pg404-nav-link {
      font-family: var(--fonte-ui);
      font-size: 0.78rem;
      color: rgba(216, 204, 186, 0.60);
      padding: 0.3rem 0.8rem;
      border: 1px solid rgba(216, 204, 186, 0.15);
      border-radius: 20px;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .pg404-nav-link:hover {
      border-color: rgba(200, 148, 12, 0.50);
      color: #C8940C;
    }

    /* ═══════════════════════════════════════════════════════════
       MOBILE ≤ 768px
       Botões centralizados na base, com scrim inferior
       ═══════════════════════════════════════════════════════════ */
    @media (max-width: 768px) {
      html, body { overflow: hidden; }

      .pg404-painel {
        bottom: 0;
        left: 0;
        right: 0;
        padding: 2.5rem 1.5rem 2.5rem;
        text-align: center;

        /* scrim de baixo para cima */
        background: linear-gradient(
          to top,
          rgba(6, 4, 2, 0.88) 0%,
          rgba(6, 4, 2, 0.60) 50%,
          transparent 100%
        );
      }

      /* remove o radial do desktop */
      .pg404-painel::before { display: none; }

      .pg404-acoes {
        justify-content: center;
        margin-bottom: 1.25rem;
      }

      .pg404-explorar {
        justify-content: center;
      }
    }

    /* ── telas muito pequenas ─────────────────────────────────── */
    @media (max-width: 380px) {
      .pg404-acoes {
        flex-direction: column;
        align-items: stretch;
        gap: 0.55rem;
      }

      .pg404-inicio,
      .pg404-biblioteca {
        justify-content: center;
      }

      .pg404-voltar {
        justify-content: center;
      }
    }

  </style>
</head>
<body>

<!-- ── IMAGEM DE FUNDO ─────────────────────────────────────────── -->
<div class="pg404-fundo" aria-hidden="true">
  <picture>
    <source media="(max-width: 768px)" srcset="img/404-celular.webp" />
    <img
      src="img/404-desktop.webp"
      alt=""
      loading="eager"
      decoding="async"
      fetchpriority="high"
    />
  </picture>
</div>

<!-- ── NAV ────────────────────────────────────────────────────── -->
<nav id="nav" role="navigation" aria-label="Navegação principal">
  <a href="index.html" class="nav-logo">Robério Diógenes<span>Escritor Independente</span></a>
  <ul class="nav-links" id="navLinks" role="list">
    <li><a href="index.html">Início</a></li>
    <li><a href="livros.html">Biblioteca</a></li>
    <li><a href="autor.html">O Autor</a></li>
    <li><a href="blog.html">Diário</a></li>
    <li><a href="contato.html">Contato</a></li>
    <li class="mobile-controles" style="display:none;" aria-label="Acessibilidade">
      <span class="mobile-controles-label">Tema &amp; Fonte</span>
      <button class="tema-btn" data-tema="claro"     title="Tema claro"     aria-label="Tema claro">☀</button>
      <button class="tema-btn" data-tema="noturno"   title="Tema noturno"   aria-label="Tema noturno">🌙</button>
      <button class="tema-btn" data-tema="contraste" title="Alto contraste" aria-label="Alto contraste">◑</button>
      <button class="fonte-btn fonte-diminuir"       title="Texto menor"    aria-label="Texto menor">A-</button>
      <button class="fonte-btn fonte-aumentar"       title="Texto maior"    aria-label="Texto maior">A+</button>
      <button class="tema-btn som-btn"               title="Sons"           aria-label="Sons">♪</button>
    </li>
  </ul>
  <div class="nav-acoes">
    <div class="tema-controles" role="group">
      <button class="tema-btn ativo" data-tema="claro"     aria-label="Claro">☀</button>
      <button class="tema-btn"       data-tema="noturno"   aria-label="Noturno">🌙</button>
      <button class="tema-btn"       data-tema="contraste" aria-label="Contraste">◑</button>
    </div>
    <div class="fonte-controles" role="group">
      <button class="fonte-btn fonte-diminuir" aria-label="A-">A-</button>
      <button class="fonte-btn fonte-aumentar" aria-label="A+">A+</button>
    </div>
    <button class="tema-btn som-btn" aria-label="Sons">♪</button>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false" aria-controls="navLinks">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ── HEADING OCULTO — SEO & acessibilidade ──────────────────── -->
<main aria-label="Página não encontrada">
  <h1 class="sr-only">Erro 404 — Página não encontrada</h1>

  <!-- ── PAINEL DE NAVEGAÇÃO ────────────────────────────────── -->
  <div class="pg404-painel">

    <nav class="pg404-acoes" aria-label="Ações para continuar navegando">
      <button class="pg404-voltar" onclick="history.back()" aria-label="Voltar à página anterior">
        <i class="fa fa-arrow-left" aria-hidden="true"></i> Voltar
      </button>
      <a href="index.html"  class="pg404-inicio">
        <i class="fa fa-home" aria-hidden="true"></i> Início
      </a>
      <a href="livros.html" class="pg404-biblioteca">
        <i class="fa fa-book-open" aria-hidden="true"></i> Biblioteca
      </a>
    </nav>

    <nav class="pg404-explorar" aria-label="Outros destinos">
      <span class="pg404-explorar-label">Explorar</span>
      <a href="autor.html"        class="pg404-nav-link">O Autor</a>
      <a href="blog.html"         class="pg404-nav-link">Diário</a>
      <a href="contato.html"      class="pg404-nav-link">Contato</a>
      <a href="leitor/index.html" class="pg404-nav-link">Área do Leitor</a>
    </nav>

  </div>
</main>

<div class="toast-wrap" role="status" aria-live="polite" aria-atomic="true"></div>
<script src="js/global.js"></script>
</body>
</html>
